<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">司机画像每日更新懒人版流程图</title>
  <desc id="desc">把新一天 xlsx 直接拖给 agent，agent 运行导入脚本，重建最近七天 dist/data 后覆盖 CDN 数据目录，原 CDN 链接继续使用。</desc>
  <rect width="1280" height="720" fill="#fff"/>
  <path d="M50 48 C224 34, 373 43, 526 38 C752 31, 938 42, 1228 36" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round" opacity=".18"/>
  <text x="64" y="86" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="800" fill="#151515">懒人版每日更新：把 xlsx 拖给 agent</text>
  <text x="66" y="126" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#666">agent 重建最近 7 天 dist/data，再用它覆盖 CDN 数据目录。</text>

  <g transform="translate(70 185)">
    <path d="M0 24 Q0 0 24 0 L292 0 Q318 1 314 28 L306 255 Q303 286 270 284 L26 284 Q-2 283 0 254 Z" fill="#fff" stroke="#181818" stroke-width="4"/>
    <text x="34" y="86" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="800" fill="#151515">1 拖给 agent</text>
    <text x="34" y="128" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#555">把新一天 xlsx 拖进对话</text>
    <path d="M68 150 L230 150 L230 232 L68 232 Z" fill="#f5fff2" stroke="#151515" stroke-width="3"/>
    <path d="M68 177 L230 177 M68 205 L230 205 M108 150 L108 232 M160 150 L160 232" stroke="#7bbf6a" stroke-width="3"/>
    <text x="42" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#777">司机库数据_YYYYMMDD.xlsx</text>
  </g>

  <g transform="translate(488 185)">
    <path d="M2 21 Q0 -2 27 0 L304 4 Q326 6 322 32 L313 254 Q309 286 276 282 L24 282 Q-1 280 0 248 Z" fill="#fff" stroke="#181818" stroke-width="4"/>
    <text x="34" y="86" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="800" fill="#151515">2 指挥 agent</text>
    <text x="34" y="128" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#555">复制每日更新提示词</text>
    <rect x="34" y="154" width="252" height="74" rx="14" fill="#fff7ec" stroke="#f05a28" stroke-width="3"/>
    <text x="55" y="195" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#333">import-driver-data</text>
    <circle cx="258" cy="82" r="28" fill="#161616"/>
    <circle cx="249" cy="76" r="4" fill="#fff"/>
    <circle cx="267" cy="77" r="4" fill="#fff"/>
    <path d="M246 92 Q258 101 270 92" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <path d="M275 58 C293 43, 297 30, 286 20" fill="none" stroke="#161616" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(902 185)">
    <path d="M4 18 Q2 -2 28 0 L306 3 Q330 4 326 31 L318 254 Q314 287 278 284 L25 283 Q-2 281 0 248 Z" fill="#fff" stroke="#181818" stroke-width="4"/>
    <text x="34" y="86" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="800" fill="#151515">3 更新七天数据</text>
    <text x="34" y="128" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#555">重建最近 7 天窗口</text>
    <path d="M58 172 L250 172 L250 234 L58 234 Z" fill="#eaf5ff" stroke="#151515" stroke-width="3"/>
    <path d="M78 202 L230 202" stroke="#1677c5" stroke-width="5" stroke-linecap="round"/>
    <text x="78" y="262" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="800" fill="#1677c5">覆盖 CDN 的 dist/data/</text>
    <text x="82" y="294" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#1677c5">原 CDN 链接继续使用</text>
  </g>

  <path d="M382 323 C421 316, 445 316, 472 324" fill="none" stroke="#151515" stroke-width="5" stroke-linecap="round"/>
  <path d="M455 305 L478 325 L452 341" fill="none" stroke="#151515" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M807 323 C848 316, 874 316, 898 324" fill="none" stroke="#151515" stroke-width="5" stroke-linecap="round"/>
  <path d="M881 305 L904 325 L878 341" fill="none" stroke="#151515" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(95 548)">
    <path d="M0 0 C184 18, 354 6, 535 15 C746 25, 926 -4, 1086 16" fill="none" stroke="#1677c5" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="50" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#151515">最后效果：页面生成时间更新，同事继续使用原链接。</text>
    <text x="0" y="88" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19" fill="#666">插图仅解释流程，不包含真实司机 ID、健康指标或完整画像数据。</text>
  </g>
</svg>
